name: Auto Scrape Campaigns

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Login and Scrape
        run: |
          TOKEN=$(curl -s -X POST "${{ secrets.APP_URL }}/api/scrape-campaigns" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"loginCampaignAdmin\",\"password\":\"${{ secrets.CAMPAIGN_ADMIN_PASSWORD }}\"}" \
            | jq -r '.token // empty')
          
          echo "Token received: $TOKEN"
          
          curl -s -X POST "${{ secrets.APP_URL }}/api/scrape-campaigns" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"action":"scrape"}'
